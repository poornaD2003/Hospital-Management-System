server.port=8083
spring.application.name=pharmacy-service
spring.jpa.hibernate.ddl-auto=update

# Database Connection to local XAMPP instance
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_pharmacy_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Show SQL logs in the console
spring.jpa.show-sql=true