<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Patient Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="patient.css">
 </head>
<body>
  <h2 style="margin-bottom:16px">Patient Authentication</h2>
  <div class="card" style="max-width:900px;margin:0 auto;">
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <button id="btnSignIn" class="btn btn-primary" style="flex:1">Sign In</button>
      <button id="btnSignUp" class="btn btn-secondary" style="flex:1">Sign Up</button>
    </div>

    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <form id="loginForm" style="flex:1;min-width:320px">
        <h3>Sign In</h3>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required>
        </div>
        <div>
          <button type="submit" class="btn btn-primary">Login</button>
        </div>
      </form>

      <form id="registerForm" style="flex:1;min-width:320px;display:none">
        <h3>Sign Up</h3>
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="regName" required>
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="regEmail" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="regPassword" required>
        </div>
        <div class="input-row">
          <div class="input-group">
            <label>Phone</label>
            <input type="text" id="regPhone">
          </div>
          <div class="input-group">
            <label>Age</label>
            <input type="number" id="regAge" min="0">
          </div>
        </div>
        <div>
          <button type="submit" class="btn btn-secondary">Register</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const loginApi = 'http://localhost:8080/api/patients/login';
    const registerApi = 'http://localhost:8080/api/patients/register';

    const btnSignIn = document.getElementById('btnSignIn');
    const btnSignUp = document.getElementById('btnSignUp');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    function showSignIn(){
      loginForm.style.display='block';
      registerForm.style.display='none';
      btnSignIn.classList.add('btn-primary');
      btnSignIn.classList.remove('btn-secondary');
      btnSignUp.classList.add('btn-secondary');
      btnSignUp.classList.remove('btn-primary');
    }

    function showSignUp(){
      loginForm.style.display='none';
      registerForm.style.display='block';
      btnSignUp.classList.add('btn-primary');
      btnSignUp.classList.remove('btn-secondary');
      btnSignIn.classList.add('btn-secondary');
      btnSignIn.classList.remove('btn-primary');
    }

    btnSignIn.addEventListener('click', showSignIn);
    btnSignUp.addEventListener('click', showSignUp);

    // default
    showSignIn();

    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      fetch(loginApi, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})})
        .then(async res => {
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        })
        .then(patient => {
          localStorage.setItem('patient', JSON.stringify(patient));
          window.location.href = 'patient.html';
        })
        .catch(err => alert('Login failed: ' + err.message));
    });

    document.getElementById('registerForm').addEventListener('submit', function(e){
      e.preventDefault();
      const payload = {
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
        phone: document.getElementById('regPhone').value,
        age: parseInt(document.getElementById('regAge').value) || null
      };
      fetch(registerApi, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
        .then(async res => {
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        })
        .then(() => {
          alert('Registration successful. You can now log in.');
          showSignIn();
        })
        .catch(err => alert('Register failed: ' + err.message));
    });
  </script>
</body>
</html>
