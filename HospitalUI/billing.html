<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Management</title>
    <link rel="stylesheet" href="billing.css">
    <style>
        /* Small helper classes to style the new dynamic sections neatly */
        .section-title {
            margin-top: 15px;
            font-size: 14px;
            color: #4b5563;
            font-weight: bold;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 3px;
        }

        .dynamic-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: flex-end;
        }

        .dynamic-list {
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 10px;
            background: #f9fafb;
            padding: 5px;
            border-radius: 4px;
            border: 1px dashed #cbd5e1;
        }

        .item-tag {
            display: flex;
            justify-content: space-between;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 500;
        }

        .remove-btn {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="dashboard-layout">
        <aside class="form-sidebar">
            <div class="brand">
                <h2>MedSched</h2>
                <p>Billing Portal</p>
            </div>

            <div class="form-card">
                <h3 id="formTitle">Create Invoice</h3>
                <form id="billingForm">
                    <input type="hidden" id="billingId">

                    <div class="input-group">
                        <label for="patientId">Patient ID</label>
                        <input type="number" id="patientId" placeholder="e.g. 1" required>
                    </div>

                    <div class="section-title">Hospital Services</div>
                    <div class="dynamic-row">
                        <div class="input-group" style="flex: 2; margin-bottom: 0;">
                            <label for="serviceSelect">Service Name</label>
                            <select id="serviceSelect">
                                <option value="">-- Select Service --</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Dermatology">Dermatology</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="General Medicine">General Medicine</option>
                            </select>
                        </div>
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label for="serviceFeeInput">Fee</label>
                            <input type="number" id="serviceFeeInput" placeholder="Rs.">
                        </div>
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <button type="button" id="addServiceBtn" class="btn btn-secondary" style="padding: 10px; width: 100%;">+ Add</button>
                        </div>
                    </div>

                    <div id="servicesList" class="dynamic-list"></div>

                    <div class="section-title">Pharmacy Medications</div>
                    <div class="dynamic-row">
                        <div class="input-group" style="flex: 2; margin-bottom: 0;">
                            <label for="medicineIdInput">Medicine ID</label>
                            <input type="number" id="medicineIdInput" placeholder="e.g. 101">
                        </div>
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <label for="medQtyInput">Qty</label>
                            <input type="number" id="medQtyInput" value="1" min="1">
                        </div>
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <button type="button" id="addMedicineBtn" class="btn btn-secondary" style="padding: 10px; width: 100%;">+ Add</button>
                        </div>
                    </div>
                    <div id="medicinesList" class="dynamic-list"></div>

                    <div class="input-row" style="margin-top: 15px;">
                        <div class="input-group">
                            <label for="paymentMethod">Method</label>
                            <select id="paymentMethod" required>
                                <option value="Cash">Cash</option>
                                <option value="Card">Card</option>
                                <option value="Online">Online</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="paymentStatus">Status</label>
                            <select id="paymentStatus" required>
                                <option value="Paid">Paid</option>
                                <option value="Pending">Pending</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary"
                        style="margin-top: 10px; width: 100%;">Save Billing</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary"
                        style="display: none; width: 100%; margin-top: 5px;">Cancel Edit</button>
                </form>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Financial Statements</h1>
                <p id="billingCount">Loading ledger statements...</p>
            </header>

            <div id="billingGrid" class="billing-grid"></div>
        </main>
    </div>

    <script src="billing.js"></script>
</body>

</html>
