<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Management System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { color: #2d8a5e; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dce7e1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #2d8a5e;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover { background-color: #226b48; }
        .doctor-card {
            background: #fff;
            border-left: 5px solid #2d8a5e;
            padding: 15px;
            margin-top: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background-color: #d94141;
            width: auto;
            padding: 5px 10px;
            font-size: 14px;
        }
        .delete-btn:hover { background-color: #b83232; }
    </style>
</head>
<body>

<div class="container">
    <h2>Add New Doctor</h2>
    <div class="form-group">
        <label>Doctor Name:</label>
        <input type="text" id="docName" placeholder="e.g., Dr. Perera">
    </div>
    <div class="form-group">
        <label>Specialization:</label>
        <input type="text" id="docSpec" placeholder="e.g., Cardiology">
    </div>
    <div class="form-group">
        <label>License Number:</label>
        <input type="text" id="docLicense" placeholder="e.g., L12345">
    </div>
    <div class="form-group">
        <label>Email:</label>
        <input type="email" id="docEmail" placeholder="e.g., perera@hospital.com">
    </div>
    <div class="form-group">
        <label>Phone:</label>
        <input type="text" id="docPhone" placeholder="e.g., 0771234567">
    </div>
    <button onclick="addDoctor()">Save Doctor Profile</button>
</div>

<div class="container">
    <h2>Registered Doctors Directory</h2>
    <div id="doctorList"></div>
</div>

<script>
    const API_URL = "http://localhost:8080/api/doctors";

    // Function 1: Fetch and display doctors from database
    async function loadDoctors() {
        try {
            const response = await fetch(API_URL);
            const doctors = await response.json();
            const listDiv = document.getElementById("doctorList");
            listDiv.innerHTML = ""; // Clear old items

            if(doctors.length === 0) {
                listDiv.innerHTML = "<p style='color: #777;'>No doctors registered yet.</p>";
                return;
            }

            doctors.forEach(doc => {
                listDiv.innerHTML += `
                        <div class="doctor-card">
                            <div>
                                <strong>${doc.name}</strong> (${doc.specialization})<br>
                                <small>Email: ${doc.email} | Phone: ${doc.phone}</small>
                            </div>
                            <button class="delete-btn" onclick="deleteDoctor(${doc.id})">Delete</button>
                        </div>
                    `;
            });
        } catch (error) {
            console.error("Error loading doctors:", error);
        }
    }

    // Function 2: Send new doctor data to backend (POST)
    async function addDoctor() {
        const name = document.getElementById("docName").value;
        const specialization = document.getElementById("docSpec").value;
        const licenseNumber = document.getElementById("docLicense").value;
        const email = document.getElementById("docEmail").value;
        const phone = document.getElementById("docPhone").value;

        if(!name || !specialization || !licenseNumber || !email || !phone) {
            alert("Please fill in all fields!");
            return;
        }

        const doctorData = { name, specialization, licenseNumber, email, phone };

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(doctorData)
            });

            if(response.ok) {
                alert("Doctor saved successfully!");
                // Clear inputs
                document.getElementById("docName").value = "";
                document.getElementById("docSpec").value = "";
                document.getElementById("docLicense").value = "";
                document.getElementById("docEmail").value = "";
                document.getElementById("docPhone").value = "";
                loadDoctors(); // Reload list
            } else {
                alert("Failed to save doctor. Check for duplicate Email/License.");
            }
        } catch (error) {
            console.error("Error adding doctor:", error);
        }
    }

    // Function 3: Delete a doctor profile (DELETE)
    async function deleteDoctor(id) {
        if(!confirm("Are you sure you want to delete this doctor?")) return;

        try {
            const response = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
            if(response.ok) {
                alert("Doctor deleted successfully!");
                loadDoctors();
            }
        } catch (error) {
            console.error("Error deleting doctor:", error);
        }
    }

    // Run this automatically when the page loads up
    loadDoctors();
</script>
</body>
</html>
