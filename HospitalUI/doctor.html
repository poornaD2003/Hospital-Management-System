<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Doctor Management</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; color: #333; padding: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 2px solid #e0e0e0; padding-bottom: 15px; }
        h1 { color: #2c3e50; font-size: 28px; }
        .admin-badge { background: #3498db; color: white; padding: 4px 8px; font-size: 12px; border-radius: 4px; vertical-align: middle; }
        
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .card-title { font-size: 18px; margin-bottom: 20px; color: #34495e; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 14px; margin-bottom: 8px; color: #666; font-weight: 500; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus, select:focus { border-color: #3498db; }
        
        .btn-container { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        .btn-primary { background-color: #2ecc71; color: white; }
        .btn-primary:hover { background-color: #27ae60; }
        .btn-cancel { background-color: #95a5a6; color: white; display: none; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #666; font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        tr:hover { background-color: #fcfcfc; }
        
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-active { background: #e8f8f0; color: #2ecc71; }
        .status-leave { background: #fef5e7; color: #f39c12; }
        
        .actions { display: flex; gap: 10px; }
        .btn-edit { background: #3498db; color: white; padding: 6px 12px; font-size: 13px; border-radius: 4px; }
        .btn-edit:hover { background: #2980b9; }
        .btn-delete { background: #e74c3c; color: white; padding: 6px 12px; font-size: 13px; border-radius: 4px; }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hospital Core Registry <span class="admin-badge">SYSTEM ADMIN</span></h1>
    </header>

    <div class="card">
        <div class="card-title" id="form-panel-title">Register New Medical Practitioner</div>
        <form id="doctorForm">
            <input type="hidden" id="doctorId">
            <div class="form-grid">
                <div class="form-group">
                    <label for="doctorName">Full Name</label>
                    <input type="text" id="doctorName" placeholder="Dr. Firstname Lastname" required>
                </div>
                <div class="form-group">
                    <label for="specialization">Medical Specialization</label>
                    <select id="specialization" required>
                        <option value="" disabled selected>-- Select Specialization --</option>
                        <option value="Cardiology">Cardiology</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Neurology">Neurology</option>
                        <option value="Pediatrics">Pediatrics</option>
                        <option value="General Surgery">General Surgery</option>
                        <option value="Psychiatry">Psychiatry</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="licenseNumber">SLMC License Number</label>
                    <input type="text" id="licenseNumber" placeholder="SLMC-REG-XXXXX" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="doctor@hospital.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" placeholder="e.g., 0771234567" required>
                </div>
                <div class="form-group" id="statusGroup" style="display: none;">
                    <label for="status">Operational Status</label>
                    <select id="status">
                        <option value="Active">Active</option>
                        <option value="On Leave">On Leave</option>
                    </select>
                </div>
            </div>
            <div class="btn-container">
                <button type="submit" class="btn-primary" id="submitBtn">Save Practitioner Record</button>
                <button type="button" class="btn-cancel" id="cancelBtn" onclick="resetForm()">Cancel Edit</button>
            </div>
        </form>
    </div>

    <div style="overflow-x: auto;">
        <table id="doctorsTable">
            <thead>
                <tr>
                    <th>License No</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Administrative Actions</th>
                </tr>
            </thead>
            <tbody id="doctorsTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/api/doctors";

    document.addEventListener("DOMContentLoaded", fetchDoctors);

    async function fetchDoctors() {
        try {
            const response = await fetch(API_URL);
            const doctors = await response.json();
            const tbody = document.getElementById("doctorsTableBody");
            tbody.innerHTML = "";

            doctors.forEach(doc => {
                const tr = document.createElement("tr");
                const statusClass = doc.status === 'Active' ? 'status-active' : 'status-leave';
                
                const docJsonString = btoa(unescape(encodeURIComponent(JSON.stringify(doc))));
                
                tr.innerHTML = `
                    <td style="font-weight: 600; color: #7f8c8d;">${doc.licenseNumber}</td>
                    <td style="font-weight: 500;">${doc.name}</td>
                    <td><span style="background: #eaeded; padding: 4px 8px; border-radius: 4px; font-size: 13px;">${doc.specialization}</span></td>
                    <td>${doc.email}</td>
                    <td>${doc.phone}</td>
                    <td><span class="status-badge ${statusClass}">${doc.status}</span></td>
                    <td class="actions">
                        <button class="btn-edit" onclick="editDoctor('${docJsonString}')">Modify</button>
                        <button class="btn-delete" onclick="deleteDoctor(${doc.id})">Remove</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error("Error connecting to Doctor API:", error);
        }
    }

    document.getElementById("doctorForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const id = document.getElementById("doctorId").value;
        const doctorData = {
            name: document.getElementById("doctorName").value,
            specialization: document.getElementById("specialization").value,
            licenseNumber: document.getElementById("licenseNumber").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            status: id ? document.getElementById("status").value : "Active"
        };

        try {
            let response;
            if (id) {
                response = await fetch(`${API_URL}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(doctorData)
                });
            } else {
                response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(doctorData)
                });
            }

            if (response.ok) {
                resetForm();
                fetchDoctors();
            }
        } catch (error) {
            console.error("Failed to save doctor details:", error);
        }
    });

    function editDoctor(encodedDoc) {
        const doc = JSON.parse(decodeURIComponent(escape(atob(encodedDoc))));

        document.getElementById("form-panel-title").innerText = "Modify Practitioner Record - ID: " + doc.id;
        document.getElementById("doctorId").value = doc.id;
        document.getElementById("doctorName").value = doc.name;
        document.getElementById("specialization").value = doc.specialization;
        document.getElementById("licenseNumber").value = doc.licenseNumber;
        document.getElementById("email").value = doc.email;
        document.getElementById("phone").value = doc.phone;
        
        document.getElementById("statusGroup").style.display = "flex";
        document.getElementById("status").value = doc.status;
        
        document.getElementById("submitBtn").innerText = "Apply Updates";
        document.getElementById("cancelBtn").style.display = "inline-block";
    }

    async function deleteDoctor(id) {
        if (confirm("Are you sure you want to permanently remove this doctor record?")) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                if (response.ok) fetchDoctors();
            } catch (error) {
                console.error("Failed to execute deletion:", error);
            }
        }
    }

    function resetForm() {
        document.getElementById("form-panel-title").innerText = "Register New Medical Practitioner";
        document.getElementById("doctorId").value = "";
        document.getElementById("doctorForm").reset();
        document.getElementById("statusGroup").style.display = "none";
        document.getElementById("submitBtn").innerText = "Save Practitioner Record";
        document.getElementById("cancelBtn").style.display = "none";
    }
</script>
</body>
</html>
