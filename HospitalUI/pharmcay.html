<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hospital Pharmacy Management System</title>
    <link rel="stylesheet" href="pharmcay.css">
</head>
<body>

    <div class="dashboard-layout">
        
        <aside class="form-sidebar">
            <div class="brand">
                <h2>MedSched</h2>
                <p>Pharmacy Inventory Portal</p>
            </div>

            <div class="form-card">
                <h3>Add / Adjust Medication Stock</h3>
                <form id="pharmacyForm">
                    <input type="hidden" id="medicationId">
                    
                    <div class="input-group">
                        <label for="medicineName">Medicine Name:</label>
                        <input type="text" id="medicineName" required placeholder="e.g., Paracetamol 500mg">
                    </div>
                    
                    <div class="input-row">
                        <div class="input-group">
                            <label for="stockQuantity">Stock Qty:</label>
                            <input type="number" id="stockQuantity" required placeholder="e.g., 500">
                        </div>
                        <div class="input-group">
                            <label for="pricePerUnit">Price (LKR):</label>
                            <input type="number" step="0.01" id="pricePerUnit" required placeholder="e.g., 3.50">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Save Stock Entry</button>
                </form>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Current Pharmacy Stock Sheet</h1>
                <p>Monitor, adjust, and update active medicine batches.</p>
            </header>

            <div class="table-container">
                <table id="pharmacyTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Medicine Name</th>
                            <th>Available Stock</th>
                            <th>Unit Price</th>
                            <th style="text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </main>

    </div>

    <script src="pharmacy.js"></script>
</body>
</html>
